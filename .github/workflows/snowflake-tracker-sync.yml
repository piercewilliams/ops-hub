name: Snowflake Tracker Sync

on:
  schedule:
    - cron: '0 14 * * 1'  # 9am CDT Monday (14:00 UTC); adjust to '0 15 * * 1' in winter (CST)
  workflow_dispatch:        # manual trigger via GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            snowflake-connector-python \
            cryptography \
            gspread \
            google-auth

      - name: Write Snowflake RSA key
        env:
          SNOWFLAKE_RSA_KEY_B64: ${{ secrets.SNOWFLAKE_RSA_KEY_B64 }}
        run: |
          set -e
          if [ -z "$SNOWFLAKE_RSA_KEY_B64" ]; then
            echo "::error::SNOWFLAKE_RSA_KEY_B64 secret is empty. Refresh via GitHub → Settings → Secrets."
            exit 1
          fi
          echo "$SNOWFLAKE_RSA_KEY_B64" | base64 -d > /tmp/sf_rsa.p8
          if [ ! -s /tmp/sf_rsa.p8 ]; then
            echo "::error::Decoded Snowflake RSA key is empty — secret is likely not base64."
            exit 1
          fi

      - name: Write Google service account credentials
        env:
          SA_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          if [ -z "$SA_JSON_B64" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret is empty."
            exit 1
          fi
          echo "$SA_JSON_B64" | base64 -d > /tmp/sa.json
          if [ ! -s /tmp/sa.json ]; then
            echo "::error::Decoded service account JSON is empty."
            exit 1
          fi

      - name: Ingest tracker sheet → Snowflake
        env:
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/sf_rsa.p8
          GOOGLE_SERVICE_ACCOUNT_FILE: /tmp/sa.json
        timeout-minutes: 15
        run: python3 scripts/ingest_tracker.py

      - name: Rebuild TRACKER_ENRICHED data model
        env:
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/sf_rsa.p8
        timeout-minutes: 30
        run: python3 scripts/model_tracker.py

      - name: Write Snowflake enrichment back to Sara's tracker (headless)
        env:
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/sf_rsa.p8
          GOOGLE_SERVICE_ACCOUNT_FILE: /tmp/sa.json
        timeout-minutes: 20
        run: python3 scripts/enrich_tracker.py

      - name: Summary — success
        if: success()
        run: |
          echo "## ✅ Monday Tracker Sync — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All three steps completed:" >> $GITHUB_STEP_SUMMARY
          echo "- **ingest_tracker.py** — Sara's tracker pushed to Snowflake" >> $GITHUB_STEP_SUMMARY
          echo "- **model_tracker.py** — TRACKER_ENRICHED rebuilt" >> $GITHUB_STEP_SUMMARY
          echo "- **enrich_tracker.py** — Enrichment columns written back to Sara's tracker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No manual action needed. Tuesday workflow runs at noon CDT." >> $GITHUB_STEP_SUMMARY

      - name: Summary — failure
        if: failure()
        run: |
          echo "## ❌ Monday Tracker Sync FAILED — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** Check the failed step above and re-run manually." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Until fixed: Sara's tracker enrichment columns and TRACKER_ENRICHED are stale." >> $GITHUB_STEP_SUMMARY
          echo "Re-run via: Actions → Snowflake Tracker Sync → Run workflow." >> $GITHUB_STEP_SUMMARY
